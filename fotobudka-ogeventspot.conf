<VirtualHost *:80>
    ServerName fotobudka-ogeventspot.pl
    ServerAlias www.fotobudka-ogeventspot.pl
    
    # Redirect all HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName fotobudka-ogeventspot.pl
    ServerAlias www.fotobudka-ogeventspot.pl
    
    DocumentRoot /var/www/fotobudka-ogeventspot.pl/public_html/dist
    
    # Main directory permissions
    <Directory "/var/www/fotobudka-ogeventspot.pl/public_html">
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>
    
    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/fotobudka-ogeventspot.pl/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/fotobudka-ogeventspot.pl/privkey.pem
    
    # Modern SSL Configuration
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder off
    SSLSessionTickets off
    
    # Proxy to Node.js application
    ProxyPreserveHost On
    ProxyPass /api/ http://localhost:3001/api/
    ProxyPassReverse /api/ http://localhost:3001/api/
    
    # Proxy SEO files to Node.js
    ProxyPass /robots.txt http://localhost:3001/robots.txt
    ProxyPassReverse /robots.txt http://localhost:3001/robots.txt
    ProxyPass /sitemap.xml http://localhost:3001/sitemap.xml
    ProxyPassReverse /sitemap.xml http://localhost:3001/sitemap.xml
    
    # Serve static files directly from Apache
    Alias /assets /var/www/fotobudka-ogeventspot.pl/public_html/public/assets
    <Directory "/var/www/fotobudka-ogeventspot.pl/public_html/public/assets">
        Options -Indexes
        AllowOverride None
        Require all granted
        
        # Cache static assets
        <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType image/webp "access plus 1 month"
            ExpiresByType video/webm "access plus 1 month"
            ExpiresByType image/png "access plus 1 month"
            ExpiresByType image/jpg "access plus 1 month"
            ExpiresByType image/jpeg "access plus 1 month"
            ExpiresByType image/svg+xml "access plus 1 month"
        </IfModule>
    </Directory>
    
    # Serve built React app
    <Directory "/var/www/fotobudka-ogeventspot.pl/public_html/dist">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        DirectoryIndex index.html
        
        # Handle React Router
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>
    
    # Serve React app for all non-API routes
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_URI} !^/assets/
    RewriteCond %{REQUEST_URI} !^/robots\.txt$
    RewriteCond %{REQUEST_URI} !^/sitemap\.xml$
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^(.*)$ /index.html [L]
    
    # Security headers
    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options nosniff
        Header always set X-Frame-Options DENY
        Header always set X-XSS-Protection "1; mode=block"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
    </IfModule>
    
    # Logging
    ErrorLog ${APACHE_LOG_DIR}/fotobudka-ogeventspot_error.log
    CustomLog ${APACHE_LOG_DIR}/fotobudka-ogeventspot_access.log combined
</VirtualHost>
